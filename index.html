<!DOCTYPE html>
<html>
<head>
    <title>Phonora Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- MENU -->
    <div id="menu" class="screen">
        <h1>🎤 Phonora</h1>
        <button class="btn" onclick="goToRoles()">Start Game</button>
    </div>

    <!-- ROLE SELECTION -->
    <div id="roles" class="screen hidden">
        <h2>Select Your Role</h2>
        <div class="grid">
            <button class="btn" onclick="selectRole('pilot')">✈️ Pilot</button>
            <button class="btn" onclick="selectRole('news')">📺 News</button>
            <button class="btn" onclick="selectRole('service')">🎧 Service</button>
            <button class="btn" onclick="selectRole('host')">🎤 Host</button>
            <button class="btn" onclick="selectRole('minister')">🏛️ Minister</button>
        </div>
    </div>

    <!-- 🎯 LEVEL SELECTION -->
    <div id="levels" class="screen hidden">
        <h2>Select Difficulty</h2>

        <button class="btn" onclick="startGame('easy')">🟢 Easy</button>
        <button class="btn" onclick="startGame('medium')">🟡 Intermediate</button>
        <button class="btn" onclick="startGame('hard')">🔴 Hard</button>
    </div>

    <!-- 🎮 GAME -->
    <div id="game" class="screen hidden">

<div class="top-bar">
    <div id="roleTitle"></div>
    <div>
        <span id="score">⭐ 0</span>
        <span id="hearts"></span>
    </div>
</div>

        <div class="card">
            <p id="script"></p>
        </div>

        <button class="btn speak" onclick="startListening()">🎙️ Speak</button>

<div id="feedback"></div>

<div style="margin-top:15px;">
    <button class="btn" onclick="nextRound()">➡️ Next</button>
    <button class="btn" onclick="goToMenu()">🏠 Menu</button>
</div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
